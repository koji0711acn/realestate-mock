<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RWAI ヒアリングシート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: #f5f7fa; color: #333; }
.header { background: #0067B3; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 16px; font-weight: 500; }
.header .subtitle { font-size: 12px; opacity: 0.8; }
.container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
.session-form { background: #fff; border-radius: 10px; padding: 20px; margin: 0 0 20px; border: 1px solid #e8e8e8; }
.session-form h2 { font-size: 14px; font-weight: 500; margin: 0 0 12px; color: #333; }
.form-row { display: flex; gap: 12px; margin: 0 0 12px; }
.form-row input { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; }
.form-row input:focus { outline: none; border-color: #0067B3; }
.btn-start { background: #0067B3; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; font-family: inherit; }
.btn-start:hover { background: #005a9e; }
.category-section { margin: 0 0 20px; }
.category-title { font-size: 13px; font-weight: 500; color: #0067B3; background: #E6F1FB; padding: 8px 14px; border-radius: 8px 8px 0 0; }
.question-card { background: #fff; border: 1px solid #e8e8e8; border-top: none; padding: 16px; }
.question-card:last-child { border-radius: 0 0 8px 8px; }
.question-text { font-size: 13px; font-weight: 500; margin: 0 0 10px; line-height: 1.6; }
.question-type-label { font-size: 11px; color: #999; margin: 0 0 8px; }
.options-group { display: flex; flex-wrap: wrap; gap: 8px; }
.option-btn { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; cursor: pointer; background: #fff; transition: all 0.15s; font-family: inherit; }
.option-btn:hover { border-color: #0067B3; color: #0067B3; }
.option-btn.selected { background: #0067B3; color: #fff; border-color: #0067B3; }
.option-btn.multi-selected { background: #E6F1FB; color: #0067B3; border-color: #0067B3; }
.rating-group { display: flex; gap: 8px; }
.rating-btn { width: 40px; height: 40px; border: 1px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; background: #fff; transition: all 0.15s; }
.rating-btn:hover { border-color: #0067B3; color: #0067B3; }
.rating-btn.selected { background: #0067B3; color: #fff; border-color: #0067B3; }
.memo-area { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; resize: vertical; min-height: 60px; font-family: inherit; margin: 8px 0 0; }
.memo-area:focus { outline: none; border-color: #0067B3; }
.export-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e0e0e0; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.export-bar .status { font-size: 12px; color: #888; }
.btn-export { background: #fff; color: #0067B3; border: 1px solid #0067B3; padding: 10px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; font-family: inherit; }
.btn-export:hover { background: #E6F1FB; }
.hidden { display: none; }
.loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Real World AI — ヒアリングシート</h1>
    <div class="subtitle">不動産デベロッパー向け 有識者インタビュー</div>
  </div>
  <div style="font-size:11px;opacity:0.7" id="session-info"></div>
</div>

<div class="container">
  <div id="session-setup" class="session-form">
    <h2>セッション情報</h2>
    <div class="form-row">
      <input type="text" id="interviewer" placeholder="実施者名">
      <input type="text" id="interviewee" placeholder="回答者名">
    </div>
    <div class="form-row">
      <input type="text" id="company" placeholder="所属企業名">
    </div>
    <button class="btn-start" onclick="startSession()">ヒアリングを開始する</button>
  </div>

  <div id="questions-area" class="hidden">
    <div class="loading" id="loading-msg">質問を読み込み中...</div>
    <div id="questions-list"></div>
  </div>
</div>

<div id="export-bar" class="export-bar hidden">
  <div class="status" id="memo-count">メモ: 0件</div>
  <div style="display:flex;gap:8px">
    <button class="btn-export" onclick="exportCSV()">CSV出力</button>
    <button class="btn-export" onclick="endSession()" style="background:#0067B3;color:#fff">ヒアリング終了</button>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://fivptpmctkfumdzeqvjr.supabase.co';
var SUPABASE_KEY = 'sb_publishable_zexOhIWAu2akWRPQ5h8_Uw_6O4b3NGW';
var currentSessionId = null;
var questions = [];
var memoData = {};

function sbFetch(path, options) {
  var opts = options || {};
  opts.headers = opts.headers || {};
  opts.headers['apikey'] = SUPABASE_KEY;
  opts.headers['Authorization'] = 'Bearer ' + SUPABASE_KEY;
  opts.headers['Content-Type'] = 'application/json';
  if (opts.upsert) {
    opts.headers['Prefer'] = 'resolution=merge-duplicates';
  }
  return fetch(SUPABASE_URL + '/rest/v1' + path, opts);
}

async function startSession() {
  var interviewer = document.getElementById('interviewer').value.trim();
  var interviewee = document.getElementById('interviewee').value.trim();
  var company = document.getElementById('company').value.trim();

  if (!interviewer || !interviewee) {
    alert('実施者名と回答者名を入力してください');
    return;
  }

  var res = await sbFetch('/sessions', {
    method: 'POST',
    headers: { 'Prefer': 'return=representation' },
    body: JSON.stringify({
      interviewer_name: interviewer,
      interviewee_name: interviewee,
      company_name: company,
      status: 'in_progress'
    })
  });
  var data = await res.json();
  currentSessionId = data[0].id;

  document.getElementById('session-setup').classList.add('hidden');
  document.getElementById('questions-area').classList.remove('hidden');
  document.getElementById('export-bar').classList.remove('hidden');
  document.getElementById('session-info').textContent = interviewee + ' (' + company + ')';

  loadQuestions();
}

async function loadQuestions() {
  var res = await sbFetch('/questions?is_active=eq.true&order=sort_order');
  questions = await res.json();

  document.getElementById('loading-msg').classList.add('hidden');
  var list = document.getElementById('questions-list');
  var currentCat = '';
  var html = '';

  questions.forEach(function(q) {
    if (q.category !== currentCat) {
      if (currentCat) html += '</div>';
      currentCat = q.category;
      html += '<div class="category-section"><div class="category-title">' + q.category + '</div>';
    }

    html += '<div class="question-card" data-qid="' + q.id + '">';
    html += '<div class="question-text">' + q.sort_order + '. ' + q.question_text + '</div>';

    if (q.question_type === 'free_text') {
      html += '<textarea class="memo-area" placeholder="回答を入力..." onchange="saveMemo(' + q.id + ', this.value)"></textarea>';
    } else if (q.question_type === 'single_select' && q.options) {
      var opts = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
      html += '<div class="options-group">';
      opts.forEach(function(opt) {
        html += '<button class="option-btn" onclick="selectOption(this, ' + q.id + ', \'' + opt.replace(/'/g, "\\'") + '\', false)">' + opt + '</button>';
      });
      html += '</div>';
    } else if (q.question_type === 'multi_select' && q.options) {
      var mopts = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
      html += '<div class="options-group">';
      mopts.forEach(function(opt) {
        html += '<button class="option-btn" onclick="selectOption(this, ' + q.id + ', \'' + opt.replace(/'/g, "\\'") + '\', true)">' + opt + '</button>';
      });
      html += '</div>';
    } else if (q.question_type === 'rating_5') {
      html += '<div class="rating-group">';
      for (var r = 1; r <= 5; r++) {
        html += '<button class="rating-btn" onclick="selectRating(this, ' + q.id + ', ' + r + ')">' + r + '</button>';
      }
      html += '</div>';
    }

    html += '<textarea class="memo-area" placeholder="メモ（任意）" style="margin-top:8px;min-height:40px" onchange="saveMemo(' + q.id + ', this.value, true)"></textarea>';
    html += '</div>';
  });

  if (currentCat) html += '</div>';
  list.innerHTML = html;
}

function selectOption(btn, qid, value, isMulti) {
  if (isMulti) {
    btn.classList.toggle('multi-selected');
    var selected = [];
    btn.parentElement.querySelectorAll('.multi-selected').forEach(function(b) {
      selected.push(b.textContent);
    });
    saveMemo(qid, selected.join(', '));
  } else {
    btn.parentElement.querySelectorAll('.option-btn').forEach(function(b) {
      b.classList.remove('selected');
    });
    btn.classList.add('selected');
    saveMemo(qid, value);
  }
}

function selectRating(btn, qid, value) {
  btn.parentElement.querySelectorAll('.rating-btn').forEach(function(b) {
    b.classList.remove('selected');
  });
  btn.classList.add('selected');
  saveMemo(qid, String(value));
}

async function saveMemo(qid, text, isMemoField) {
  if (!currentSessionId) return;
  memoData[qid] = memoData[qid] || {};
  if (isMemoField) {
    memoData[qid].memo = text;
  } else {
    memoData[qid].answer = text;
  }

  var memoText = '';
  if (memoData[qid].answer) memoText += memoData[qid].answer;
  if (memoData[qid].memo) memoText += (memoText ? ' | メモ: ' : '') + memoData[qid].memo;

  await sbFetch('/memos', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify({
      session_id: currentSessionId,
      question_id: qid,
      memo_text: memoText
    })
  });

  var count = Object.keys(memoData).filter(function(k) { return memoData[k].answer || memoData[k].memo; }).length;
  document.getElementById('memo-count').textContent = 'メモ: ' + count + '件';
}

async function exportCSV() {
  if (!currentSessionId) return;
  var res = await sbFetch('/memos?session_id=eq.' + currentSessionId + '&order=question_id');
  var memos = await res.json();

  var csv = '\uFEFF質問ID,カテゴリ,質問文,回答・メモ\n';
  questions.forEach(function(q) {
    var memo = memos.find(function(m) { return m.question_id === q.id; });
    var text = memo ? memo.memo_text.replace(/"/g, '""') : '';
    csv += q.id + ',"' + q.category + '","' + q.question_text + '","' + text + '"\n';
  });

  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'hearing_' + new Date().toISOString().slice(0,10) + '.csv';
  link.click();
}

async function endSession() {
  if (!currentSessionId) return;
  if (!confirm('ヒアリングを終了しますか？')) return;

  await sbFetch('/sessions?id=eq.' + currentSessionId, {
    method: 'PATCH',
    body: JSON.stringify({ status: 'completed' })
  });

  alert('ヒアリングが完了しました。CSVは出力済みですか？');
  document.getElementById('questions-area').classList.add('hidden');
  document.getElementById('export-bar').classList.add('hidden');
  document.getElementById('session-setup').classList.remove('hidden');
  currentSessionId = null;
  memoData = {};
}
</script>

</body>
</html>
